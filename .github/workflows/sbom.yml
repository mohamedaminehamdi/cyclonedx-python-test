name: SBOM & Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [created]

permissions:
  contents: write        # needed to upload to release
  pull-requests: write   # needed to post PR comments
  security-events: write # needed for GitHub Security tab

jobs:
  sbom-and-scan:
    name: Generate SBOM & Scan
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # ── 4. Generate SBOM ──────────────────────────────────────────
      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment -o sbom.json
          cyclonedx-py environment -o sbom.xml

      # ── 5. Upload SBOM as artifact ────────────────────────────────
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.json
            sbom.xml
          retention-days: 90

      # ── 6. Trivy vulnerability scan ───────────────────────────────
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          exit-code: 0          # we handle failure manually below
          severity: CRITICAL,HIGH

      # ── 7. Trivy — output SARIF for GitHub Security tab ──────────
      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # ── 8. Post summary to PR ─────────────────────────────────────
      - name: Post SBOM + scan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Build Trivy summary
            let trivy = '';
            try {
              trivy = fs.readFileSync('trivy-results.txt', 'utf8').trim();
            } catch {
              trivy = 'No results file found.';
            }

            // Build SBOM component count from JSON
            let sbomSummary = '';
            try {
              const sbom = JSON.parse(fs.readFileSync('sbom.json', 'utf8'));
              const count = sbom.components?.length ?? 0;
              sbomSummary = `**${count} components** inventoried in SBOM.`;
            } catch {
              sbomSummary = 'Could not parse SBOM JSON.';
            }

            const body = `## 🧾 SBOM & Security Scan Results

            **Commit:** \`${{ github.sha }}\`

            ### 📦 CycloneDX SBOM
            ${sbomSummary}
            SBOM files uploaded as artifact: \`sbom-${{ github.sha }}\`

            ### 🔍 Trivy Vulnerability Scan (CRITICAL & HIGH)
            \`\`\`
            ${trivy.length > 3000 ? trivy.substring(0, 3000) + '\n...(truncated)' : trivy || 'No vulnerabilities found ✅'}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── 9. Fail build if CRITICAL/HIGH vulns found ────────────────
      - name: Fail pipeline if vulnerabilities found
        run: |
          if grep -qE "^(CRITICAL|HIGH)" trivy-results.txt; then
            echo "❌ CRITICAL or HIGH vulnerabilities found. Failing build."
            cat trivy-results.txt
            exit 1
          else
            echo "✅ No CRITICAL or HIGH vulnerabilities found."
          fi

      # ── 10. Attach SBOM to GitHub Release ─────────────────────────
      - name: Upload SBOM to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.json
            sbom.xml
